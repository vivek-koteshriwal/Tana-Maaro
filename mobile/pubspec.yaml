name: tanamaaro_mobile
description: "A new Flutter project for Tana Maaro."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6

  # State Management
  flutter_riverpod: ^2.4.9

  # UI & Icons
  google_fonts: ^6.2.0
  font_awesome_flutter: ^10.7.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  shimmer: ^3.0.0
  timeago: ^3.7.0

  # Utilities
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  share_plus: ^9.0.0
  google_sign_in: ^6.2.1
  app_links: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
